<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F7F5F2">
<title>Madplan</title>
<style>
:root{--bg:#F7F5F2;--card:#fff;--line:#E7E2DC;--text:#1f1f1f;--muted:#6b6b6b;--soft:#F3E7EA;--accent:#800020;--r:22px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(#fbfaf8,var(--bg));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh}button,input,select,textarea{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:5;padding:calc(18px + var(--safe-top)) 16px 12px;background:rgba(247,245,242,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.brand{display:flex;gap:13px;align-items:center;margin-bottom:14px}.mark{width:48px;height:48px;border-radius:17px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:900;font-size:20px}.brand b{display:block;font-size:30px;letter-spacing:-.06em;line-height:.95}.brand small{display:block;color:var(--muted);font-size:12px;margin-top:5px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.tabs button{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:9px 5px;font-size:11px;font-weight:650}.tabs button.active{background:var(--accent);border-color:var(--accent);color:#fff}.wrap{max-width:980px;margin:0 auto;padding:18px 14px calc(34px + var(--safe-bottom))}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:0 16px 40px rgba(41,24,18,.07)}h1,h2,h3{margin:0}h2{font-size:18px;letter-spacing:-.03em}.sub{color:var(--muted);font-size:13px;line-height:1.45;margin:7px 0 0}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.grid{display:grid;gap:12px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.btn{border:0;background:var(--accent);color:#fff;border-radius:999px;padding:11px 15px;font-weight:750}.btn.secondary{background:#fff;color:var(--accent);border:1px solid rgba(128,0,32,.25)}.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}.btn.small{padding:7px 10px;font-size:12px}.field label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;padding:11px;color:var(--text)}textarea{min-height:84px}.day{display:grid;grid-template-columns:46px 1fr;gap:11px;align-items:start}.bubble{width:42px;height:42px;border-radius:16px;background:var(--soft);color:var(--accent);display:grid;place-items:center;font-weight:800}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:11px;background:var(--soft);color:var(--accent);font-weight:700}.cat{margin:16px 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent)}.item{display:grid;grid-template-columns:32px 1fr auto;gap:9px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(231,226,220,.7)}.item:last-child{border-bottom:0}.check{width:26px;height:26px;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;color:#fff;background:#fff}.check.on{background:var(--accent);border-color:var(--accent)}.qty{display:flex;align-items:center;gap:6px}.qty button{width:30px;height:30px;border-radius:10px;border:1px solid var(--line);background:#fff}.qty span{min-width:22px;text-align:center;font-weight:750}.chips{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0}.chip{border:1px solid rgba(128,0,32,.18);background:var(--soft);color:var(--accent);border-radius:999px;padding:7px 10px;font-size:12px}.recipe-row{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}.recipe-row:last-child{border-bottom:0}.hide{display:none!important}.printbox{background:#fff;border-radius:18px;border:1px solid var(--line);padding:22px}.printbox h1{font-size:30px;color:var(--accent);margin-bottom:14px}.printbox h3{font-size:18px;color:var(--accent);margin-top:14px;margin-bottom:8px}.printbox ul{margin:0 0 0 20px;padding:0}.printbox p,.printbox li{font-size:17px;line-height:1.45}.printbox li{margin:4px 0}.shopping-cols{column-count:2;column-gap:30px}.shopping-group{break-inside:avoid;margin-bottom:8px}@media(max-width:520px){.shopping-cols{column-count:1}}@media(min-width:760px){.days{grid-template-columns:repeat(2,1fr)}.listgrid{grid-template-columns:repeat(2,1fr)}}@media print{.top,.no-print{display:none!important}.wrap{padding:0;max-width:none}.card{box-shadow:none;border:0}.printbox{border:0;padding:0}body{background:#fff}.shopping-cols{column-count:2}}
</style>
</head>
<body>
<div class="top"><div class="brand"><div class="mark">M</div><div><b>Madplan</b><small>Ugens retter og indkøbsliste</small></div></div><div class="tabs"><button data-tab="plan" class="active">Madplan</button><button data-tab="list">Indkøb</button><button data-tab="recipes">Retter</button><button data-tab="print">PDF</button></div></div>
<main class="wrap"><section id="plan" class="tab"></section><section id="list" class="tab hide"></section><section id="recipes" class="tab hide"></section><section id="print" class="tab hide"></section></main>
<script>
const CATS=['grøntsager og frugt','brød','frostvarer','andet','konserves og tørvarer','mælkeprodukter og pålæg','mel og gryn','nonfood'];
const STANDARD=[['tomater',1,'bakke','grøntsager og frugt'],['agurk',1,'stk','grøntsager og frugt'],['peberfrugt',1,'stk','grøntsager og frugt'],['havregryn',1,'pakke','mel og gryn'],['mælk',3,'liter','mælkeprodukter og pålæg'],['rugbrød',1,'pakke','brød'],['figenstænger',1,'pakke','mel og gryn'],['rosiner',1,'pakke','mel og gryn'],['cheddarost',1,'stk','mælkeprodukter og pålæg'],['æg',1,'bakke','mælkeprodukter og pålæg']].map(x=>({name:x[0],qty:x[1],unit:x[2],category:x[3]}));
const OPTIONAL={'grøntsager og frugt':['bananer','æbler','appelsiner','kiwi','vindruer','snackgulerødder','lime','spidskål','hvidkål'],'brød':['boller','pitabrød'],'frostvarer':['frosne hindbær'],'konserves og tørvarer':['marmelade','makrel','chips','kaffe'],'mælkeprodukter og pålæg':['kærnemælk','koldskål','græsk yoghurt','creme fraiche','gær','juice','yoghurt','smør','havremælk','leverpostej','skinke'],'andet':['sild','ristede løg','remoulade','ketchup','nachos','pålægschokolade'],'nonfood':['toiletpapir','opvaskemiddel','opvasketabs','vaskepulver','tandpasta','køkkenrulle','afspændingsmiddel','salt til opvaskemaskine'],'mel og gryn':['chiafrø','knækbrød','flager','mel','riskiks','majskiks','rugmel','skårne rugkerner','solsikkekerner','mandler','peanuts','hørfrø','hasselnødder','ahornsirup','grove havregryn','fuldkornsmel','nudler','honning']};
let recipes=[],weekRecipes=[],plan=[],shopping=[],days=4,meatDays=1,excluded={},pendingShopping=null;
const $=s=>document.querySelector(s);const cap=s=>(s||'').charAt(0).toUpperCase()+(s||'').slice(1);const slug=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||Math.random().toString(36).slice(2,9);const id=()=>Math.random().toString(36).slice(2,9);const cleanName=s=>String(s??'').trim().replace(/\bbroccolli\b/gi,'broccoli');const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const store={get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
function normalizeRecipe(r){let name=cleanName(r.name);let ing=(r.ingredients||[]).map(x=>typeof x==='string'?{name:cleanName(x),category:'andet'}:{name:cleanName(x.name),category:String(x.category||'andet').trim()}).filter(x=>x.name);return {id:r.id||slug(name),name,type:String(r.type||'andet').trim().toLowerCase()||'andet',ingredients:ing}}
function mergeRecipes(list){(list||[]).map(normalizeRecipe).forEach(r=>{if(r.name&&!recipes.some(x=>x.id===r.id))recipes.push(r)})}
function minShopping(list){return (list||[]).map(i=>({name:cleanName(i.name),category:i.category,qty:i.qty,on:i.on,source:i.source}))}
function stateObj(){let chosen=plan.map(byId).filter(Boolean).map(r=>({id:r.id,name:r.name,type:r.type,ingredients:r.ingredients}));return {v:2,days,meatDays,plan,excluded,recipes:chosen,shopping:minShopping(shopping)}}
function applyState(d){weekRecipes=(d.recipes||[]).map(normalizeRecipe);mergeRecipes(weekRecipes);days=Number(d.days)||4;meatDays=Number(d.meatDays??1);excluded=d.excluded||{};plan=(d.plan||[]).filter(x=>recipes.some(r=>r.id===x));pendingShopping=Array.isArray(d.shopping)?d.shopping.map(i=>({id:id(),name:cleanName(i.name),category:String(i.category||'andet'),qty:Number(i.qty)||1,on:i.on!==false,source:i.source||'delt'})).filter(i=>i.name):null}
function enc(obj){return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
function dec(str){str=str.replace(/-/g,'+').replace(/_/g,'/');while(str.length%4)str+='=';return JSON.parse(decodeURIComponent(escape(atob(str))))}
function sharedFromHash(){let m=location.hash.match(/uge=([^&]+)/);if(!m)return false;try{applyState(dec(m[1]));history.replaceState(null,'',location.pathname+location.search);saveSession(false);return true}catch(e){alert('Kunne ikke indlæse den delte uge.');return false}}
async function loadRecipes(){for(let url of ['recipes.json','https://mgforever26.github.io/investeringsdashboard/madplan/recipes.json']){try{let res=await fetch(url,{cache:'no-store'});if(res.ok)return (await res.json()).map(normalizeRecipe)}catch(e){}}return []}
async function init(){recipes=await loadRecipes();if(!recipes.length)recipes=[{name:'pasta carbonara',type:'kød',ingredients:[{name:'pasta',category:'konserves og tørvarer'},{name:'æg',category:'mælkeprodukter og pålæg'},{name:'parmesanost',category:'mælkeprodukter og pålæg'},{name:'bacon',category:'mælkeprodukter og pålæg'}]}].map(normalizeRecipe);let local=store.get('madplan_recipes_v1',null);if(local&&local.length)recipes=local.map(normalizeRecipe);let gotShared=sharedFromHash();if(!gotShared){let saved=sessionStorage.getItem('madplan_state_v1');if(saved){try{applyState(JSON.parse(saved))}catch{}}}plan=plan.filter(x=>recipes.some(r=>r.id===x));if(!plan.length)generatePlan(false);buildShopping();if(pendingShopping){shopping=pendingShopping.map(i=>({id:id(),name:cleanName(i.name),category:i.category,qty:Number(i.qty)||1,on:i.on!==false,source:i.source||'delt'}));pendingShopping=null}saveSession(false);renderAll()}
function saveRecipes(){store.set('madplan_recipes_v1',recipes.filter(r=>!weekRecipes.some(w=>w.id===r.id))) }
function saveSession(){sessionStorage.setItem('madplan_state_v1',JSON.stringify(stateObj()))}
function byId(x){return recipes.find(r=>r.id===x)||recipes[0]}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function generatePlan(){let meat=shuffle(recipes.filter(r=>r.type==='kød')),other=shuffle(recipes.filter(r=>r.type!=='kød')),pick=[];meat.slice(0,Math.min(meatDays,meat.length)).forEach(r=>pick.push(r));other.slice(0,Math.max(0,days-pick.length)).forEach(r=>pick.push(r));while(pick.length<days&&recipes.length)pick.push(recipes[Math.floor(Math.random()*recipes.length)]);plan=shuffle(pick).slice(0,days).map(r=>r.id);excluded={};buildShopping();saveSession()}
function ingredientKey(day,i){return day+'|'+cleanName(i.name).toLowerCase()+'|'+(i.category||'andet')}
function ingOn(day,i){return !excluded[ingredientKey(day,i)]}
function toggleIng(day,idx){let r=byId(plan[day]),i=(r.ingredients||[])[idx];if(!i)return;let k=ingredientKey(day,i);if(excluded[k])delete excluded[k];else excluded[k]=true;buildShopping();saveSession();renderAll()}
function buildShopping(){let m={};function add(name,cat,qty=1,source='ret'){name=cleanName(name);cat=cat||'andet';let key=cat+'|'+name.toLowerCase();if(!m[key])m[key]={id:id(),name,category:cat,qty:0,on:true,source};m[key].qty+=qty}plan.map(byId).forEach((r,di)=>(r.ingredients||[]).forEach(i=>{if(ingOn(di,i))add(i.name,i.category,1,'ret')}));STANDARD.forEach(i=>add(i.name,i.category,i.qty,'standard'));shopping=Object.values(m).sort((a,b)=>CATS.indexOf(a.category)-CATS.indexOf(b.category)||a.name.localeCompare(b.name,'da'))}
async function shareWeek(){saveSession();let link=location.origin+location.pathname+'#uge='+enc(stateObj());try{if(navigator.share){await navigator.share({title:'Madplan',text:'Her er ugens madplan',url:link});return}await navigator.clipboard.writeText(link);alert('Del uge-linket er kopieret. Send det til hende.')}catch(e){prompt('Kopiér Del uge-linket:',link)}}
function setTab(t){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));document.querySelectorAll('.tab').forEach(s=>s.classList.add('hide'));$('#'+t).classList.remove('hide');renderAll()}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
function renderAll(){renderPlan();renderList();renderRecipes();renderPrint()}
function renderPlan(){let el=$('#plan');el.innerHTML=`<div class="card"><h2>Ugens madplan</h2><p class="sub">Vælg antal dage, kød-dage og retter. Ingredienserne føres automatisk over i indkøbslisten.</p><div class="grid2" style="margin-top:14px"><div class="field"><label>Dage</label><select id="days">${[1,2,3,4,5,6,7].map(n=>`<option ${days==n?'selected':''}>${n}</option>`).join('')}</select></div><div class="field"><label>Dage med kød</label><select id="meat">${Array.from({length:days+1},(_,n)=>`<option ${meatDays==n?'selected':''}>${n}</option>`).join('')}</select></div></div><div class="row" style="margin-top:14px"><button class="btn" id="gen">Generér ny madplan</button><button class="btn secondary" onclick="setTab('list')">Gå til indkøbsliste →</button></div></div><div class="grid days">${plan.map((rid,i)=>dayCard(i,rid)).join('')}</div>`;$('#days').onchange=e=>{days=+e.target.value;if(meatDays>days)meatDays=days;while(plan.length<days)plan.push(recipes[0].id);plan=plan.slice(0,days);buildShopping();saveSession();renderAll()};$('#meat').onchange=e=>{meatDays=+e.target.value;saveSession();renderPlan()};$('#gen').onclick=()=>{generatePlan();renderAll()};document.querySelectorAll('[data-day]').forEach(sel=>sel.onchange=e=>{plan[+e.target.dataset.day]=e.target.value;excluded={};buildShopping();saveSession();renderAll()})}
function dayCard(i,rid){let r=byId(rid);return `<div class="card day"><div class="bubble">${i+1}</div><div><div class="row" style="justify-content:space-between"><h3>Dag ${i+1}</h3><span class="pill">${esc(r.type)}</span></div><select data-day="${i}" style="margin:10px 0">${recipes.map(x=>`<option value="${x.id}" ${x.id===rid?'selected':''}>${esc(cap(x.name))}</option>`).join('')}</select><details><summary class="sub">Ingredienser (${r.ingredients.filter(x=>ingOn(i,x)).length}/${r.ingredients.length} valgt)</summary><div style="margin-top:8px">${r.ingredients.map((x,idx)=>`<div class="item" style="grid-template-columns:32px 1fr"><button class="check ${ingOn(i,x)?'on':''}" onclick="toggleIng(${i},${idx})">${ingOn(i,x)?'✓':''}</button><div><b>${esc(x.name)}</b><div class="sub" style="margin:2px 0 0">${esc(x.category)}</div></div></div>`).join('')}</div></details></div></div>`}
function renderList(){let el=$('#list'),groups={};shopping.forEach(i=>(groups[i.category]??=[]).push(i));el.innerHTML=`<div class="card"><h2>Indkøbsliste</h2><p class="sub">Varer fra retter og standardvarer er valgt til. Vælg fra/til, justér antal og tilføj ekstra varer under hver kategori.</p><div class="row" style="margin-top:12px"><button class="btn secondary" onclick="buildShopping();saveSession();renderAll()">Nulstil listen</button><button class="btn" onclick="setTab('print')">Vis/PDF →</button></div></div><div class="listgrid grid">${CATS.map(c=>catBlock(c,groups[c]||[])).join('')}</div>`;document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{let it=shopping.find(x=>x.id===b.dataset.toggle);it.on=!it.on;saveSession();renderList();renderPrint()});document.querySelectorAll('[data-plus]').forEach(b=>b.onclick=()=>{let it=shopping.find(x=>x.id===b.dataset.plus);it.qty++;saveSession();renderList();renderPrint()});document.querySelectorAll('[data-minus]').forEach(b=>b.onclick=()=>{let it=shopping.find(x=>x.id===b.dataset.minus);it.qty=Math.max(0,it.qty-1);if(it.qty===0)it.on=false;saveSession();renderList();renderPrint()});document.querySelectorAll('[data-addopt]').forEach(b=>b.onclick=()=>addItem(b.dataset.cat,b.dataset.addopt));document.querySelectorAll('[data-addcustom]').forEach(b=>b.onclick=()=>{let c=b.dataset.addcustom,v=document.querySelector(`[data-input="${c}"]`).value.trim();if(v)addItem(c,v)})}
function catBlock(cat,items){return `<div class="card"><h3 class="cat">${cap(cat)}</h3>${items.length?items.map(itemRow).join(''):'<p class="sub">Ingen varer endnu.</p>'}<div class="chips">${(OPTIONAL[cat]||[]).map(x=>`<button class="chip" data-cat="${esc(cat)}" data-addopt="${esc(x)}">+ ${esc(x)}</button>`).join('')}</div><div class="row"><input data-input="${esc(cat)}" placeholder="Tilføj anden vare"><button class="btn small secondary" data-addcustom="${esc(cat)}">Tilføj</button></div></div>`}
function itemRow(i){return `<div class="item"><button class="check ${i.on?'on':''}" data-toggle="${i.id}">${i.on?'✓':''}</button><div><b>${esc(i.name)}</b><div class="sub" style="margin:2px 0 0">${esc(i.source)}</div></div><div class="qty"><button data-minus="${i.id}">−</button><span>${i.qty}</span><button data-plus="${i.id}">+</button></div></div>`}
function addItem(cat,name){name=cleanName(name);let found=shopping.find(i=>i.category===cat&&i.name.toLowerCase()===name.toLowerCase());if(found){found.qty++;found.on=true}else shopping.push({id:id(),name,category:cat,qty:1,on:true,source:'ekstra'});saveSession();renderList();renderPrint()}
function renderRecipes(){let own=recipes.filter(r=>!weekRecipes.some(w=>w.id===r.id)),el=$('#recipes');el.innerHTML=`<div class="card"><h2>Retbibliotek</h2><p class="sub">Nye retter gemmes lokalt i denne browser. Eksportér backup, hvis du vil flytte dem til en anden enhed.</p><div class="row" style="margin-top:12px"><button class="btn" onclick="showRecipeForm()">Tilføj ret</button><button class="btn secondary" onclick="exportRecipes()">Eksportér backup</button><label class="btn ghost" style="display:inline-flex"><input type="file" accept=".json" style="display:none" onchange="importRecipes(event)">Importér</label></div></div><div id="recipeform"></div><div class="card">${own.map(r=>`<div class="recipe-row"><div><b>${esc(cap(r.name))}</b><div class="sub">${esc(r.type)} · ${r.ingredients.length} ingredienser</div></div><div class="row"><button class="btn small ghost" onclick="showRecipeForm('${r.id}')">Redigér</button><button class="btn small ghost" onclick="dupRecipe('${r.id}')">Kopi</button><button class="btn small ghost" onclick="delRecipe('${r.id}')">Slet</button></div></div>`).join('')}</div>`}
function showRecipeForm(rid){let r=rid?byId(rid):{id:'',name:'',type:'vegetar',ingredients:[]};$('#recipeform').innerHTML=`<div class="card"><h3>${rid?'Redigér':'Tilføj'} ret</h3><div class="grid2" style="margin-top:12px"><div class="field"><label>Navn</label><input id="rname" value="${esc(r.name)}"></div><div class="field"><label>Type</label><select id="rtype">${['kød','fisk','vegetar','andet'].map(t=>`<option ${r.type===t?'selected':''}>${t}</option>`).join('')}</select></div></div><div class="field" style="margin-top:12px"><label>Ingredienser — én pr. linje: vare | kategori</label><textarea id="rings">${r.ingredients.map(i=>`${i.name} | ${i.category}`).join('\n')}</textarea></div><div class="row" style="margin-top:12px"><button class="btn" onclick="saveRecipe('${rid||''}')">Gem ret</button><button class="btn ghost" onclick="$('#recipeform').innerHTML=''">Annullér</button></div></div>`;window.scrollTo({top:0,behavior:'smooth'})}
function saveRecipe(rid){let name=cleanName($('#rname').value),type=$('#rtype').value,lines=$('#rings').value.split('\n').map(x=>x.trim()).filter(Boolean);if(!name)return alert('Mangler navn');let ingredients=lines.map(l=>{let [n,c]=l.split('|').map(x=>(x||'').trim());return {name:cleanName(n),category:c||guessCat(n)}}).filter(x=>x.name);let obj=normalizeRecipe({id:rid||slug(name),name,type,ingredients}),ix=recipes.findIndex(r=>r.id===rid);if(ix>=0)recipes[ix]=obj;else recipes.push(obj);saveRecipes();buildShopping();saveSession();renderAll()}
function delRecipe(rid){if(confirm('Slet retten?')){recipes=recipes.filter(r=>r.id!==rid);plan=plan.filter(x=>x!==rid);if(!plan.length)generatePlan();saveRecipes();buildShopping();saveSession();renderAll()}}
function dupRecipe(rid){let r=JSON.parse(JSON.stringify(byId(rid)));r.id=slug(r.name+' kopi '+id());r.name=r.name+' kopi';recipes.push(r);saveRecipes();renderAll()}
function guessCat(n){n=cleanName(n).toLowerCase();if(/mælk|fløde|ost|yoghurt|æg|bacon|skinke|smør/.test(n))return 'mælkeprodukter og pålæg';if(/tomat|løg|guler|kartof|agurk|peber|squash|avokado|lime|citron|kål|salat|hvidløg|broccoli/.test(n))return 'grøntsager og frugt';if(/frost|ærter|majs/.test(n))return 'frostvarer';if(/pasta|ris|linser|bønner|tomatpure|hakkede tomater|kikærter/.test(n))return 'konserves og tørvarer';if(/mel|gryn|nød|rosin|mandel|brød/.test(n))return 'mel og gryn';return 'andet'}
function exportRecipes(){let own=recipes.filter(r=>!weekRecipes.some(w=>w.id===r.id)),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(own,null,2)],{type:'application/json'}));a.download='madplan-retter-backup.json';a.click()}
function importRecipes(e){let f=e.target.files[0];if(!f)return;let reader=new FileReader();reader.onload=()=>{try{recipes=JSON.parse(reader.result).map(normalizeRecipe);saveRecipes();generatePlan();buildShopping();saveSession();renderAll()}catch{alert('Kunne ikke importere filen')}};reader.readAsText(f)}
function finalItems(){return shopping.filter(i=>i.on&&i.qty>0)}
function groupedItems(){let g={};finalItems().forEach(i=>(g[i.category]??=[]).push(i));return g}
function renderPrint(){let groups=groupedItems();$('#print').innerHTML=`<div class="card no-print"><h2>Visning og PDF</h2><p class="sub">Download PDF, åbn PDF eller del den aktuelle uge som link.</p><div class="row" style="margin-top:12px"><button class="btn" onclick="downloadPdf()">Download PDF</button><button class="btn secondary" onclick="openPdf()">Åbn PDF</button><button class="btn secondary" onclick="shareWeek()">Del uge</button></div></div><div class="printbox"><h1>Ugens madplan</h1>${plan.map((rid,i)=>`<p><b>Dag ${i+1}:</b> ${esc(cap(byId(rid).name))}</p>`).join('')}<h1 style="margin-top:34px">Indkøbslisten</h1><div class="shopping-cols">${CATS.map(c=>groups[c]?.length?`<div class="shopping-group"><h3>${cap(c)}</h3><ul>${groups[c].map(i=>`<li>${esc(i.name)} (${i.qty})</li>`).join('')}</ul></div>`:'').join('')}</div></div>`}
function wrapText(t,max){if(!t)return [''];let words=String(t).split(' '),out=[],line='';words.forEach(w=>{if((line+' '+w).trim().length>max){if(line)out.push(line);line=w}else line=(line+' '+w).trim()});if(line)out.push(line);return out}
function ansiHex(s){let map={'æ':230,'ø':248,'å':229,'Æ':198,'Ø':216,'Å':197,'é':233,'è':232,'ü':252,'ö':246,'ä':228,'É':201,'–':45,'—':45,'“':34,'”':34,'’':39,'✓':42};let h='';for(let ch of String(s)){let c=map[ch]??ch.charCodeAt(0);if(c<0||c>255)c=63;h+=c.toString(16).padStart(2,'0')}return h}
function makePdfBlob(){let pages=[],cur=[];function pushPage(){if(cur.length){pages.push(cur);cur=[]}}function addText(t,s,b,x,y){cur.push({t:String(t||''),s:s||12,b:!!b,x:x,y:y})}let y=790;function addFull(t,s,b,g=0){let max=s>=24?38:s>=17?54:66;for(let part of wrapText(t,max)){if(y<60){pushPage();y=790}addText(part,s,b,56,y);y-=s+8}y-=g}addFull('Ugens madplan',27,true,8);plan.forEach((rid,i)=>addFull(`Dag ${i+1}: ${cap(byId(rid).name)}`,17,false,1));y-=24;addFull('Indkøbslisten',27,true,8);let xs=[56,310],ys=[y,y],col=0;function nextColumn(){if(col===0){col=1}else{pushPage();col=0;ys=[790,790]}}function addCol(t,s,b,g=0){let max=s>=18?27:31;for(let part of wrapText(t,max)){if(ys[col]<55)nextColumn();addText(part,s,b,xs[col],ys[col]);ys[col]-=s+7}ys[col]-=g}let g=groupedItems();CATS.forEach(c=>{if(g[c]?.length){if(ys[col]<95)nextColumn();addCol(cap(c),19,true,3);g[c].forEach(i=>addCol(`- ${i.name} (${i.qty})`,16,false,0));ys[col]-=8}});pushPage();let n=pages.length,font1=3+n*2,font2=font1+1,objs=[];objs[1]='<< /Type /Catalog /Pages 2 0 R >>';objs[2]=`<< /Type /Pages /Kids [${pages.map((_,i)=>`${3+i*2} 0 R`).join(' ')}] /Count ${n} >>`;pages.forEach((p,i)=>{let po=3+i*2,co=po+1,stream=p.map(x=>`BT /F${x.b?2:1} ${x.s} Tf ${x.x} ${x.y} Td <${ansiHex(x.t)}> Tj ET\n`).join('');objs[po]=`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 ${font1} 0 R /F2 ${font2} 0 R >> >> /Contents ${co} 0 R >>`;objs[co]=`<< /Length ${stream.length} >>\nstream\n${stream}endstream`});objs[font1]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>';objs[font2]='<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>';let pdf='%PDF-1.4\n',offs=[0];for(let i=1;i<objs.length;i++){offs[i]=pdf.length;pdf+=`${i} 0 obj\n${objs[i]}\nendobj\n`}let xref=pdf.length;pdf+=`xref\n0 ${objs.length}\n0000000000 65535 f \n`;for(let i=1;i<objs.length;i++)pdf+=String(offs[i]).padStart(10,'0')+' 00000 n \n';pdf+=`trailer\n<< /Size ${objs.length} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;return new Blob([pdf],{type:'application/pdf'})}
function downloadPdf(){let blob=makePdfBlob(),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='madplan_og_indkøbsliste.pdf';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),30000)}
function openPdf(){let url=URL.createObjectURL(makePdfBlob());window.open(url,'_blank')}
function downloadTxt(){let txt='Ugens madplan\n'+plan.map((rid,i)=>`Dag ${i+1}: ${cap(byId(rid).name)}`).join('\n')+'\n\nIndkøbslisten\n',g=groupedItems();CATS.forEach(c=>{if(g[c]?.length){txt+='\n'+cap(c)+'\n'+g[c].map(i=>`- ${i.name} (${i.qty})`).join('\n')+'\n'}});let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download='madplan_og_indkøbsliste.txt';a.click()}
init();
</script>
